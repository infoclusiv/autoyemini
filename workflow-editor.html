<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Editor</title>
  <link rel="stylesheet" href="workflow-editor.css">
</head>
<body>
  <div id="editorApp">

    <header class="editor-header">
      <div class="editor-logo">
        <span class="editor-logo-icon">⚡</span>
        <span class="editor-logo-text">Workflow Editor</span>
      </div>

      <div class="editor-toolbar">
        <!-- Workflow management -->
        <div class="editor-wf-group">
          <select id="editorWorkflowSelect" class="editor-select"></select>
          <button id="editorNewBtn" class="editor-btn editor-btn-success" title="New Workflow">+ New</button>
          <button id="editorRenameBtn" class="editor-btn editor-btn-secondary" title="Rename selected workflow">Rename</button>
          <button id="editorDeleteBtn" class="editor-btn editor-btn-danger" title="Delete selected workflow">Delete</button>
        </div>

        <div class="editor-divider"></div>

        <!-- Step addition -->
        <div class="editor-step-group">
          <button id="editorAddStepBtn" class="editor-btn editor-btn-primary" title="Add a new step to this workflow">+ New Step</button>
        </div>
      </div>
    </header>

    <main class="editor-canvas-wrapper">
      <div id="editorEmptyState" class="editor-empty-state" style="display:none;">
        <div class="editor-empty-icon">📋</div>
        <div class="editor-empty-title">No workflow selected</div>
        <div class="editor-empty-text">Select an existing workflow or create a new one using the toolbar above.</div>
      </div>

      <div id="editorNoSteps" class="editor-empty-state" style="display:none;">
        <div class="editor-empty-icon">➕</div>
        <div class="editor-empty-title">No steps yet</div>
        <div class="editor-empty-text">Click <strong>+ New Step</strong> in the toolbar to begin building this workflow.</div>
      </div>

      <div id="editorCanvas" class="editor-canvas"></div>
    </main>

  </div>

  <!-- Step Config Modal -->
  <div id="stepModal" class="step-modal-overlay" style="display:none;">
    <div class="step-modal-box">
      <div class="step-modal-header">
        <span id="stepModalTitle" class="step-modal-heading">Configure Step</span>
        <button id="stepModalCloseBtn" class="step-modal-close" title="Cancel">✕</button>
      </div>
      <div class="step-modal-body">
        <label class="step-modal-label" for="stepModalTitleInput">Step Title</label>
        <input
          id="stepModalTitleInput"
          class="step-modal-input"
          type="text"
          placeholder="e.g. Research phase"
          autocomplete="off"
        />
        <label class="step-modal-label" for="stepModalContentInput">Prompt Text</label>
        <textarea
          id="stepModalContentInput"
          class="step-modal-textarea"
          placeholder="Enter the full prompt to send in this step…"
          rows="14"
        ></textarea>
      </div>
      <div class="step-modal-footer">
        <button id="stepModalCancelBtn" class="editor-btn editor-btn-secondary">Cancel</button>
        <button id="stepModalSaveBtn" class="editor-btn editor-btn-primary">Save Step</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="shared/utils.js"></script>
  <script type="module" src="sidepanel/workflowEditor/workflowEditorApp.js"></script>
</body>
</html>
